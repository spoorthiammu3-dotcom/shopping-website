<!DOCTYPE html>
<html>
<head>
  <title>Simple Shop</title>
</head>

<body style="font-family: Arial; background-color: #f4f4f4; margin: 0;">

  <!-- Header -->
  <div style="background-color: #333; color: white; padding: 15px;">
    <h1>My Shopping Store</h1>
  </div>

  <!-- Products Section -->
  <div style="padding: 20px;">

    <h2>Products</h2>

    <!-- Product 1 -->
    <div style="background: white; padding: 15px; margin-bottom: 10px;">
      <h3>T-Shirt</h3>
      <p>Price: ₹499</p>
      <button>Add to Cart</button>
    </div>

    <!-- Product 2 -->
    <div style="background: white; padding: 15px; margin-bottom: 10px;">
      <h3>Shoes</h3>
      <p>Price: ₹1999</p>
      <button>Add to Cart</button>
    </div>

    <!-- Product 3 -->
    <div style="background: white; padding: 15px; margin-bottom: 10px;">
      <h3>Watch</h3>
      <p>Price: ₹1499</p>
      <button>Add to Cart</button>
    </div>

  </div>

  <!-- Footer -->
  <div style="background-color: #333; color: white; text-align: center; padding: 10px;">
    <p>© 2026 My Store</p>
  </div>

</body>
</html>
